<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b82"/>
    </marker>
    <style>
      .title { font: 700 34px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #132238; }
      .subtitle { font: 500 16px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #5b6b82; }
      .boxTitle { font: 700 20px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #132238; }
      .boxText { font: 500 15px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4f5d73; }
      .small { font: 600 14px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4f5d73; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="70" y="72" class="title">智绘阅读系统总体架构图</text>
  <text x="70" y="104" class="subtitle">从阅读器、世界观、关系页到本地图片与持久化的完整协同结构</text>

  <rect x="70" y="150" width="260" height="540" rx="28" fill="#ffffff" stroke="#dbe5f0"/>
  <text x="105" y="198" class="boxTitle">界面层</text>
  <rect x="98" y="225" width="205" height="78" rx="18" fill="#f7faff" stroke="#c8d6ea"/>
  <text x="118" y="258" class="boxTitle" font-size="18">书架 BookShelf</text>
  <text x="118" y="283" class="boxText">导入书籍、管理封面、删除书籍</text>
  <rect x="98" y="322" width="205" height="94" rx="18" fill="#f7faff" stroke="#c8d6ea"/>
  <text x="118" y="355" class="boxTitle" font-size="18">阅读器 Reader</text>
  <text x="118" y="380" class="boxText">单段生图、批量生图、扫描设定</text>
  <text x="118" y="402" class="boxText">导出、风格与模型切换</text>
  <rect x="98" y="436" width="205" height="84" rx="18" fill="#f7faff" stroke="#c8d6ea"/>
  <text x="118" y="469" class="boxTitle" font-size="18">世界观 AssetLibrary</text>
  <text x="118" y="494" class="boxText">角色/地点资产管理与重生成</text>
  <rect x="98" y="540" width="205" height="110" rx="18" fill="#f7faff" stroke="#c8d6ea"/>
  <text x="118" y="573" class="boxTitle" font-size="18">关系页 SocialNetwork</text>
  <text x="118" y="598" class="boxText">关系图、AI 伴读、角色扮演</text>
  <text x="118" y="620" class="boxText">阅读进度限制与聊天持久化</text>

  <rect x="390" y="150" width="300" height="540" rx="28" fill="#ffffff" stroke="#dbe5f0"/>
  <text x="425" y="198" class="boxTitle">应用编排层</text>
  <rect x="420" y="225" width="240" height="100" rx="18" fill="#eef6ff" stroke="#bdd0e5"/>
  <text x="445" y="258" class="boxTitle">App.tsx</text>
  <text x="445" y="283" class="boxText">全局状态中心</text>
  <text x="445" y="305" class="boxText">书籍、角色、关系、插图、聊天记录</text>
  <rect x="420" y="350" width="240" height="112" rx="18" fill="#eef6ff" stroke="#bdd0e5"/>
  <text x="445" y="383" class="boxTitle">任务引擎</text>
  <text x="445" y="408" class="boxText">叙事分析</text>
  <text x="445" y="430" class="boxText">缺失角色补图</text>
  <text x="445" y="452" class="boxText">按顺序分批并发生成</text>
  <rect x="420" y="488" width="240" height="132" rx="18" fill="#eef6ff" stroke="#bdd0e5"/>
  <text x="445" y="521" class="boxTitle">关系与聊天编排</text>
  <text x="445" y="546" class="boxText">按已生图章节截断正文</text>
  <text x="445" y="568" class="boxText">生成关系图</text>
  <text x="445" y="590" class="boxText">伴读 / 角色扮演提示词约束</text>

  <rect x="750" y="150" width="280" height="540" rx="28" fill="#ffffff" stroke="#dbe5f0"/>
  <text x="785" y="198" class="boxTitle">AI 服务层</text>
  <rect x="778" y="225" width="224" height="126" rx="18" fill="#fff7ed" stroke="#f3c89d"/>
  <text x="803" y="258" class="boxTitle">文本分析服务</text>
  <text x="803" y="283" class="boxText">scanChapterForAssets</text>
  <text x="803" y="305" class="boxText">analyzeNarrative</text>
  <text x="803" y="327" class="boxText">analyzeRelationships</text>
  <rect x="778" y="373" width="224" height="124" rx="18" fill="#fff7ed" stroke="#f3c89d"/>
  <text x="803" y="406" class="boxTitle">关系与聊天服务</text>
  <text x="803" y="431" class="boxText">按阅读进度生成关系图</text>
  <text x="803" y="453" class="boxText">AI 伴读 / 角色扮演</text>
  <rect x="778" y="520" width="224" height="100" rx="18" fill="#fff7ed" stroke="#f3c89d"/>
  <text x="803" y="553" class="boxTitle">图片生成服务</text>
  <text x="803" y="578" class="boxText">封面、角色图、地点图、插图</text>

  <rect x="1090" y="150" width="240" height="540" rx="28" fill="#ffffff" stroke="#dbe5f0"/>
  <text x="1125" y="198" class="boxTitle">本地存储层</text>
  <rect x="1117" y="225" width="186" height="122" rx="18" fill="#eefcf4" stroke="#b6dec4"/>
  <text x="1142" y="258" class="boxTitle">IndexedDB</text>
  <text x="1142" y="283" class="boxText">books</text>
  <text x="1142" y="305" class="boxText">characters / locations / relationships</text>
  <text x="1142" y="327" class="boxText">illustrations / relationshipChats</text>
  <rect x="1117" y="374" width="186" height="122" rx="18" fill="#eefcf4" stroke="#b6dec4"/>
  <text x="1142" y="407" class="boxTitle">pic_db</text>
  <text x="1142" y="432" class="boxText">封面</text>
  <text x="1142" y="454" class="boxText">角色图 / 地点图</text>
  <text x="1142" y="476" class="boxText">章节插图</text>
  <rect x="1117" y="523" width="186" height="97" rx="18" fill="#eefcf4" stroke="#b6dec4"/>
  <text x="1142" y="556" class="boxTitle">索引恢复</text>
  <text x="1142" y="581" class="boxText">命名归一化与本地查找</text>

  <line x1="330" y1="420" x2="390" y2="420" stroke="#5b6b82" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="690" y1="420" x2="750" y2="420" stroke="#5b6b82" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1030" y1="420" x2="1090" y2="420" stroke="#5b6b82" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="350" y="400" class="small">状态与事件</text>
  <text x="708" y="400" class="small">模型调用</text>
  <text x="1045" y="400" class="small">持久化</text>

  <rect x="70" y="740" width="1260" height="96" rx="24" fill="#132238"/>
  <text x="102" y="783" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#ffffff">当前系统特征</text>
  <text x="102" y="816" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#d8e2ef">本地优先、阅读驱动、世界观沉淀、关系页 AI 化、图片长期保存。系统已经从基础生图原型演进为具备完整阅读工作流的综合型软件作品。</text>
</svg>
